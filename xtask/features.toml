# Declares which target(s) each Cargo feature of a workspace library crate is
# valid for: "local" (x86_64-unknown-linux-gnu / std), "esp32"
# (xtensa-esp32-none-elf / no_std via -Zbuild-std=core,alloc), or "both".
#
# Consumed at runtime by `xtask hack` (cargo-hack --include-features) and
# `xtask lsp` (per-target stand-in for --all-features). Crates without a
# meaningful [features] table are simply omitted here.

[ember]
std = "local"
acc = "both"
acc-http = "local"
acc-custom = "both"
agent-bdi = "both"
agent-reactive = "both"
esp32 = "esp32"
acc-espnow = "esp32"

[ember-acc]
std = "local"
http = "local"
serde-http = "local"
custom = "both"
espnow = "esp32"
serde-espnow = "esp32"

[ember-time]
std = "local"
esp32 = "esp32"
