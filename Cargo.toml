[workspace]
resolver = "2"
members = ["core", "examples", "tests"]

[workspace.dependencies]
no-std-framework-core = { path = "./core" }

[profile.dev]
opt-level = 3
debug = false
strip = "none"
debug-assertions = false
overflow-checks = false
lto = false
panic = 'unwind'
incremental = false
codegen-units = 16
rpath = false
