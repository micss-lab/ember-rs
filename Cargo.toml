[workspace]
resolver = "2"
members = [
    "ember",
    "ember-acc",
    "ember-core",
    "ember-time",

    "bindings",
    "examples",

    "case-studies/colour-combinations",
    "case-studies/home-automation",
    "case-studies/http-server",
    "case-studies/ntp-server",
    "case-studies/plant-monitoring",
    "case-studies/smart-home",
    "case-studies/smart-home-distributed",
]

[workspace.dependencies]
ember = { path = "./ember" }
ember-acc = { path = "./ember-acc" }
ember-core = { path = "./ember-core" }
ember-time = { path = "./ember-time" }
