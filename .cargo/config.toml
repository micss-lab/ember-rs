[env]
ESP_LOG = "trace"

[target.riscv32imc-unknown-none-elf]
rustflags = ["-C", "link-arg=-Tlinkall.x", "-C", "force-frame-pointers"]
runner = "wokwi-server --chip esp32c3"

[build]
target-dir = "./target"
target = ["riscv32imc-unknown-none-elf", "x86_64-unknown-linux-gnu"]

[alias]
check-local = "check --target=x86_64-unknown-linux-gnu"
check-esp = "check --target=riscv32imc-unknown-none-elf"
build-local = "build --target=x86_64-unknown-linux-gnu"
build-esp = "build --target=riscv32imc-unknown-none-elf"
run-local = "run --target=x86_64-unknown-linux-gnu"
run-esp = "run --target=riscv32imc-unknown-none-elf"
test-local = "test --target=x86_64-unknown-linux-gnu"
test-esp = "test --target=riscv32imc-unknown-none-elf"
